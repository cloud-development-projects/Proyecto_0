version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: proyecto0-postgres-dev
    environment:
      POSTGRES_DB: proyecto_0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      # Mount the SQL script to initialize the database
      - ./db/000_create_tables.sql:/docker-entrypoint-initdb.d/001_project_tables.sql
      # Mount additional initialization script for auth module
      - ./backend/db/migrations/002_auth_tables.sql:/docker-entrypoint-initdb.d/002_auth_tables.sql
      # Persist data in named volume
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - proyecto0-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proyecto_0"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Database admin interface
  adminer:
    image: adminer:latest
    container_name: proyecto0-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - proyecto0-dev-network

volumes:
  postgres_dev_data:
    driver: local

networks:
  proyecto0-dev-network:
    driver: bridge
