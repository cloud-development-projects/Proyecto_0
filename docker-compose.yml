version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: proyecto0-postgres
    environment:
      POSTGRES_DB: proyecto_0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      # Mount the SQL script to initialize the database
      - ./db/000_create_tables.sql:/docker-entrypoint-initdb.d/001_project_tables.sql
      # Mount additional initialization script for auth module
      - ./backend/db/migrations/002_auth_tables.sql:/docker-entrypoint-initdb.d/002_auth_tables.sql
      # Persist data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proyecto0-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proyecto_0"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyecto0-api
    ports:
      - "8080:8080"
    environment:
      # Database configuration
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=proyecto_0
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_SSL_MODE=disable
      - DB_MAX_OPEN_CONNS=25
      - DB_MAX_IDLE_CONNS=5

      # Server configuration
      - PORT=8080
      - HOST=0.0.0.0
      - GIN_MODE=release

      # JWT configuration
      - JWT_SECRET=production-secret-please-change-in-real-deployment
      - JWT_ISSUER=Proyecto_0
      - JWT_EXPIRATION=24h

      # App configuration
      - APP_NAME=Proyecto_0
      - APP_VERSION=1.0.0
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proyecto0-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  proyecto0-network:
    driver: bridge
